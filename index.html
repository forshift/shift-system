<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト調整</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --bg-card: #fbf9f3;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #8a8478;
    --accent: #b23a3a;
    --accent-soft: #d4a5a5;
    --line: #d8d2c4;
    --line-strong: #b8b2a4;
    --ok: #2d6a4f;
    --warn: #c77b2e;
    --select: #f5e6c4;
    --name-font: clamp(12px, 1.4vw, 15px);
    --name-box-width: calc(var(--name-font) * 2 + 16px);
    --name-box-height: calc(var(--name-font) * 1.5 + 4px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; font-weight: 400; line-height: 1.7; }
  body { min-height: 100vh; padding: clamp(20px, 3vw, 40px) clamp(4px, 1.5vw, 20px) 100px; }
  .container { max-width: 1100px; margin: 0 auto; }
  h1, h2, h3 { font-family: 'Shippori Mincho', serif; font-weight: 700; letter-spacing: 0.02em; }
  h1 { font-size: clamp(22px, 3vw, 32px); margin-bottom: 4px; }
  h2 { font-size: clamp(16px, 2vw, 21px); margin-bottom: clamp(18px, 2.5vw, 26px); display: flex; align-items: center; gap: 10px; }
  h2::before { content: ''; width: 4px; height: clamp(14px, 1.8vw, 20px); background: var(--accent); display: inline-block; }
  h3 { font-size: clamp(13px, 1.5vw, 16px); margin-bottom: clamp(12px, 1.5vw, 16px); color: var(--ink-soft); }
  .subtitle { color: var(--ink-muted); font-size: clamp(11px, 1.2vw, 14px); margin-bottom: 32px; letter-spacing: 0.05em; }
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 4px; padding: clamp(20px, 2.8vw, 32px) clamp(14px, 2vw, 26px); margin-bottom: clamp(20px, 3vw, 36px); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  input[type="text"], input[type="number"], input[type="date"], select {
    font-family: inherit; font-size: 14px; padding: 8px 12px; border: 1px solid var(--line-strong); border-radius: 3px; background: white; color: var(--ink); min-width: 140px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent-soft); outline-offset: -1px; border-color: var(--accent); }
  button { font-family: inherit; font-size: 14px; padding: 8px 16px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg-card); cursor: pointer; border-radius: 3px; transition: all 0.15s; font-weight: 500; }
  button:hover { background: var(--accent); border-color: var(--accent); }
  button.ghost { background: transparent; color: var(--ink); }
  button.ghost:hover { background: var(--ink); color: var(--bg-card); }
  button.danger { background: transparent; color: var(--accent); border-color: var(--accent); }
  button.danger:hover { background: var(--accent); color: white; }
  button.small { padding: 4px 10px; font-size: 12px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  label { font-size: 13px; color: var(--ink-soft); font-weight: 500; letter-spacing: 0.03em; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: white; border: 1px solid var(--line-strong); border-radius: 999px; font-size: 13px; }
  .pill button { padding: 0; background: none; border: none; color: var(--ink-muted); font-size: 16px; line-height: 1; }
  .pill button:hover { color: var(--accent); background: none; }
  .name-pill { background: var(--select); border: 1px solid var(--line-strong); padding: 6px 14px; border-radius: 999px; cursor: pointer; font-size: 14px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .name-pill:hover { background: var(--accent-soft); }
  .name-pill.active { background: var(--ink); color: var(--bg-card); border-color: var(--ink); }
  .name-pill .del { color: var(--ink-muted); font-size: 14px; cursor: pointer; padding: 0 2px; }
  .name-pill .del:hover { color: var(--accent); }
  .name-pill.active .del { color: var(--bg-card); opacity: 0.7; }
  .calendar { border-collapse: separate; border-spacing: 0; width: 100%; background: white; border: 1px solid var(--line-strong); table-layout: fixed; }
  .calendar th { background: var(--ink); color: var(--bg-card); padding: clamp(6px, 1vw, 12px) clamp(2px, 0.5vw, 6px); font-size: clamp(10px, 1.2vw, 13px); font-weight: 500; letter-spacing: 0.08em; border-right: 1px solid var(--ink-soft); }
  .calendar th:last-child { border-right: none; }
  .calendar th.sat { color: #9bc3e8; }
  /* 列幅: 月〜金は 1 単位、土は 2 単位 (PCもスマホも同比率)
     -> 各平日 = 1/7 ≒ 14.29%, 土 = 2/7 ≒ 28.57% */
  .calendar th:nth-child(6), .calendar td:nth-child(6) { width: 28.57%; }
  /* セル: tdはtable-cellのまま。内側に .cell-inner を置いて flex で空きスペース中央配置 */
  .calendar td { border: 1px solid var(--line); padding: 0; height: clamp(70px, 11vw, 110px); width: 14.29%; background: white; position: relative; vertical-align: top; }
  .cell-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; width: 100%; height: 100%; padding: clamp(20px, 2.5vw, 28px) clamp(2px, 0.5vw, 6px) clamp(2px, 0.5vw, 6px); }
  .cell-inner > .combined-cell,
  .cell-inner > .decided-cell,
  .cell-inner > .slot-rows-group { width: 100%; align-self: stretch; }
  .calendar td.empty { background: var(--bg); }
  .calendar td.excluded { background: #ede8db; color: var(--ink-muted); }
  .date-num { position: absolute; top: clamp(3px, 0.6vw, 6px); left: clamp(4px, 0.8vw, 8px); font-family: 'JetBrains Mono', monospace; font-size: clamp(11px, 1.3vw, 14px); color: var(--ink-soft); font-weight: 500; line-height: 1; }
  .date-num.sat { color: #3a7ab2; }
  .excluded-label { font-size: clamp(9px, 1vw, 11px); color: var(--ink-muted); font-style: italic; margin-top: 4px; }
  .slot { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; padding: clamp(3px, 0.7vw, 6px) clamp(4px, 1vw, 10px); background: var(--bg); border-radius: 3px; cursor: pointer; font-size: clamp(11px, 1.3vw, 14px); transition: all 0.1s; user-select: none; min-height: clamp(26px, 3.5vw, 32px); }
  .slot.solo { justify-content: center; padding: clamp(6px, 1.5vw, 12px) clamp(2px, 0.5vw, 6px); min-height: clamp(38px, 5vw, 52px); width: clamp(40px, 6vw, 60px); margin: 0; }
  /* 土曜の参加可能日カレンダー: ラベル左/選択枠は右余白の中央。3行をグループ化 */
  .slot-rows-group { display: flex; flex-direction: column; gap: 4px; }
  .slot-row { display: grid; grid-template-columns: auto 1fr; gap: 6px; align-items: center; }
  .slot-row-label { font-size: clamp(12px, 1.4vw, 15px); color: var(--ink-muted); font-weight: 600; text-align: left; }
  .slot.in-row { width: clamp(38px, 5vw, 50px); margin: 0 auto; justify-content: center; padding: clamp(4px, 1vw, 8px) 2px; min-height: clamp(30px, 4vw, 38px); }
  .slot.in-row .slot-mark { font-size: clamp(18px, 2.4vw, 24px); }
  .slot:hover { background: var(--select); }
  .slot-label { color: var(--ink-soft); font-size: clamp(10px, 1.2vw, 13px); font-weight: 500; letter-spacing: 0.04em; }
  .slot-mark { font-size: clamp(16px, 2vw, 22px); line-height: 1; font-weight: 700; }
  .slot.solo .slot-mark { font-size: 26px; }
  .slot-mark.circle { color: var(--ok); }
  .slot-mark.triangle { color: var(--warn); }
  .slot-mark.cross { color: var(--accent); opacity: 0.5; }
  .read-only .slot { cursor: default; }
  .read-only .slot:hover { background: var(--bg); }
  .combined-cell { font-size: clamp(10px, 1.1vw, 12px); padding: 2px 3px; line-height: 1.4; }
  .combined-cell .slot-line { display: flex; gap: 4px; align-items: baseline; flex-wrap: wrap; }
  /* 平日: 名前を幅の中央(50%)に正確に配置。pxを使わず gap も % で表現してスマホで揺れないように */
  .combined-cell .slot-line.solo { display: block; }
  .combined-cell .slot-line.solo > span { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; }
  .combined-cell .slot-line.solo .name-row { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; }
  .combined-cell .slot-line.solo .name-tag { margin: 0; }
  .combined-cell .slot-line-label { color: var(--ink-muted); font-weight: 500; min-width: 28px; flex-shrink: 0; }
  /* 土曜: ラベル左、名前は右枠内の中央配置 */
  .combined-cell .sat-line { display: grid; grid-template-columns: auto 1fr; gap: 6px; align-items: center; }
  .combined-cell .sat-line .sat-label { text-align: left; margin-right: 0; }
  .combined-cell .sat-line .sat-names-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .combined-cell .sat-line .sat-names-row { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .combined-cell .sat-line .sat-names-row .sat-name { margin: 0; }
  .combined-cell .name-tag { font-size: var(--name-font); padding: 2px 2px; background: var(--bg); border-radius: 2px; color: var(--ink-soft); margin: 0 3px 3px 0; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; font-weight: 500; width: var(--name-box-width); height: var(--name-box-height); box-sizing: border-box; }
  .name-tag.circle { background: #d8ebd8; color: var(--ok); }
  .name-tag.triangle { background: #f3e2c8; color: var(--warn); }
  .name-tag.cross { background: #f0d8d8; color: var(--accent); }
  .decided-cell { padding: 4px 5px; }
  .decided-cell .slot-line { display: flex; gap: 4px; margin-top: 2px; font-size: clamp(11px, 1.2vw, 13px); flex-wrap: wrap; justify-content: center; }
  /* 平日: 名前を幅の中央(50%)に正確に配置。gap も % で表現 */
  .decided-cell .slot-line.solo { display: block; }
  .decided-cell .slot-line.solo > span { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; }
  .decided-cell .slot-line.solo .assigned-name { margin: 0; }
  /* シフト表 土曜: ラベルは左揃え、名前は残りスペースの中央配置 */
  .decided-cell .sat-line { display: grid; grid-template-columns: auto 1fr; gap: 6px; align-items: center; }
  .decided-cell .sat-line .sat-label { text-align: left; margin-right: 0; }
  .decided-cell .sat-line .sat-names-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .decided-cell .sat-line .sat-names-wrap .sat-name { margin: 0; }
  .decided-cell .slot-line-label { color: var(--ink-muted); font-weight: 500; min-width: 32px; flex-shrink: 0; }
  .decided-cell .assigned-name { font-size: var(--name-font); background: var(--select); padding: 2px 2px; border-radius: 2px; color: var(--ink); font-weight: 500; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; margin: 0 3px 3px 0; width: var(--name-box-width); height: var(--name-box-height); box-sizing: border-box; }
  /* 土曜セル: 「午前: 名前、名前」のインライン表示 (縦長を抑える) */
  .sat-line { display: block; line-height: 1.7; margin-bottom: 4px; font-size: clamp(12px, 1.4vw, 15px); }
  .sat-line .sat-label { color: var(--ink-muted); font-weight: 600; margin-right: 4px; }
  .sat-line .sat-name { white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; vertical-align: top; padding: 2px 2px; border-radius: 2px; margin: 0 3px 3px 0; font-weight: 600; font-size: var(--name-font); width: var(--name-box-width); height: var(--name-box-height); box-sizing: border-box; }
  .sat-line .sat-name.circle { background: #d8ebd8; color: var(--ok); }
  .sat-line .sat-name.triangle { background: #f3e2c8; color: var(--warn); }
  .sat-line .sat-name.cross { background: #f0d8d8; color: var(--accent); }
  .sat-line .sat-name-decided { background: var(--select); color: var(--ink); font-weight: 600; }
  .month-header { text-align: center; font-family: 'Shippori Mincho', serif; font-size: clamp(18px, 2.4vw, 24px); margin: clamp(20px, 3vw, 32px) 0 clamp(14px, 2vw, 20px); letter-spacing: 0.1em; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; font-size: 12px; color: var(--ink-soft); margin-bottom: clamp(16px, 2.2vw, 24px); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-mark { font-weight: 700; font-size: 14px; }
  .summary-box { background: white; border: 1px solid var(--line); padding: 16px; border-radius: 3px; margin-bottom: 12px; }
  .summary-name { font-family: 'Shippori Mincho', serif; font-size: 16px; margin-bottom: 6px; }
  .summary-dates { font-family: 'JetBrains Mono', monospace; font-size: clamp(12px, 1.3vw, 14px); color: var(--ink-soft); line-height: 1.8; }
  .summary-dates .date-chip { white-space: nowrap; display: inline-block; }
  .summary-count { display: inline-block; margin-left: 8px; padding: 2px 8px; background: var(--ink); color: var(--bg-card); border-radius: 999px; font-size: 11px; font-family: 'Noto Sans JP', sans-serif; }
  .empty-state { color: var(--ink-muted); font-style: italic; font-size: 13px; padding: 8px 0; }
  .submit-bar { display: flex; gap: 12px; justify-content: flex-end; padding-top: clamp(16px, 2.5vw, 28px); margin-top: clamp(8px, 1.5vw, 16px); }
  .submit-bar button { padding: clamp(12px, 1.8vw, 16px) clamp(24px, 3vw, 36px); font-size: clamp(14px, 1.5vw, 16px); }
  .warning { background: #fdf3e7; border: 1px solid var(--warn); color: var(--warn); padding: clamp(14px, 1.8vw, 18px) clamp(14px, 2vw, 20px); border-radius: 3px; font-size: 13px; margin-bottom: clamp(18px, 2.5vw, 24px); }
  .info { background: #e8f0f5; border: 1px solid #7da7c8; color: #2c5a82; padding: clamp(14px, 1.8vw, 18px) clamp(14px, 2vw, 20px); border-radius: 3px; font-size: 13px; margin-bottom: clamp(18px, 2.5vw, 24px); }
  .topbar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress { font-size: 13px; color: var(--ink-muted); font-family: 'JetBrains Mono', monospace; }
  .ornament { text-align: center; color: var(--ink-muted); font-size: 18px; margin: 8px 0 32px; letter-spacing: 1em; }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--ink); margin-bottom: 0; }
  .tab { padding: 10px 20px; cursor: pointer; border: 1px solid var(--line); border-bottom: none; background: var(--bg); font-size: 13px; font-weight: 500; }
  .tab.active { background: var(--ink); color: var(--bg-card); border-color: var(--ink); }
  details { background: white; border: 1px solid var(--line); border-radius: 3px; padding: clamp(14px, 1.8vw, 18px) clamp(14px, 2vw, 20px); margin-bottom: clamp(14px, 2vw, 18px); }
  details summary { cursor: pointer; font-size: 14px; font-weight: 500; color: var(--ink-soft); user-select: none; }
  details[open] summary { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  hr { border: none; border-top: 1px dashed var(--line-strong); margin: 20px 0; }
</style>
</head>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Supabase (オプション): セットアップ後にコメント解除 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ============================================================
// 設定: Supabaseを使う場合はここを編集
// ============================================================
const SUPABASE_URL = "https://boxjmdbbqlvlzokuqrzi.supabase.co";   // 例: "https://xxxxx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJveGptZGJicWx2bHpva3VxcnppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzc5MjksImV4cCI6MjA5NDY1MzkyOX0.WdvVotKAtwWzCTkX_s181vnjx0883nTtmE2VNQ2NleQ";   // anon key
const USE_SUPABASE = true; // trueにするとSupabaseを利用 (上のscriptタグも有効化)
const BOT_URL = "https://shift-system-ige3.onrender.com"; // 確定シフトを自動投稿させるBotのURL (末尾スラッシュなし)

// ============================================================
// 日本の祝日データ (内閣府CSV由来; 1年ごとに更新可能)
// 出典: https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv
// ============================================================
const HOLIDAYS = {
  "2025-01-01": "元日","2025-01-13": "成人の日","2025-02-11": "建国記念の日",
  "2025-02-23": "天皇誕生日","2025-02-24": "振替休日","2025-03-20": "春分の日",
  "2025-04-29": "昭和の日","2025-05-03": "憲法記念日","2025-05-04": "みどりの日",
  "2025-05-05": "こどもの日","2025-05-06": "振替休日","2025-07-21": "海の日",
  "2025-08-11": "山の日","2025-09-15": "敬老の日","2025-09-23": "秋分の日",
  "2025-10-13": "スポーツの日","2025-11-03": "文化の日","2025-11-23": "勤労感謝の日",
  "2025-11-24": "振替休日",
  "2026-01-01": "元日","2026-01-12": "成人の日","2026-02-11": "建国記念の日",
  "2026-02-23": "天皇誕生日","2026-03-20": "春分の日","2026-04-29": "昭和の日",
  "2026-05-03": "憲法記念日","2026-05-04": "みどりの日","2026-05-05": "こどもの日",
  "2026-05-06": "振替休日","2026-07-20": "海の日","2026-08-11": "山の日",
  "2026-09-21": "敬老の日","2026-09-22": "国民の休日","2026-09-23": "秋分の日",
  "2026-10-12": "スポーツの日","2026-11-03": "文化の日","2026-11-23": "勤労感謝の日",
  "2027-01-01": "元日"
};

// ============================================================
// ユーティリティ
// ============================================================
const pad = (n) => String(n).padStart(2, '0');
const fmtDate = (y, m, d) => `${y}-${pad(m)}-${pad(d)}`;
const parseDate = (s) => { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const getNextMonth = () => {
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 2;
  if (m > 12) { m -= 12; y++; }
  return { year: y, month: m };
};
const SLOTS_WEEKDAY = ['pm'];
const SLOTS_SATURDAY = ['am', 'noon', 'pm'];
const SLOT_LABEL = { am: '午前', noon: '正午', pm: '午後' };
const SLOT_CAPACITY = { am_sat: 1, noon_sat: 2, pm_sat: 2, pm_weekday: 2 };

const getThirdThursday = (year, month) => {
  let count = 0;
  for (let d = 1; d <= daysInMonth(year, month); d++) {
    const date = new Date(year, month - 1, d);
    if (date.getDay() === 4) { count++; if (count === 3) return fmtDate(year, month, d); }
  }
  return null;
};

const cycleMark = (m, skipCircle = false) => {
  if (skipCircle) return m === 'triangle' ? 'cross' : 'triangle';
  return m === 'cross' ? 'circle' : m === 'circle' ? 'triangle' : 'cross';
};
const markChar = (m) => m === 'circle' ? '◯' : m === 'triangle' ? '△' : '✕';
// 名前が3文字以上のとき、枠内に収まるようフォントを縮小 (padding 2px に合わせ広め)
const nameFontStyle = (name) => name.length > 2
  ? { fontSize: `calc(var(--name-font) * 2.6 / ${name.length})` }
  : null;

// ============================================================
// ストレージ抽象化 (localStorage または Supabase)
// ============================================================
const storage = {
  load: (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  save: (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }
};

// Supabase wrapper (USE_SUPABASE=true の場合に使用)
// 簡略化のためテーブル構造は schema.sql を参照
const supabaseClient = (USE_SUPABASE && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  : null;

async function loadStateFromBackend(yearMonth) {
  // Supabase連携サンプル: 実運用ではこの関数を完成させる
  if (!supabaseClient) return null;
  const { data: names } = await supabaseClient.from('names').select('name').order('created_at');
  const { data: cfg } = await supabaseClient.from('month_config').select('*').eq('year_month', yearMonth).maybeSingle();
  const { data: resps } = await supabaseClient.from('responses').select('*').eq('year_month', yearMonth);
  const { data: dec } = await supabaseClient.from('decisions').select('*').eq('year_month', yearMonth).maybeSingle();
  return { names: (names||[]).map(n=>n.name), config: cfg||null, responses: resps||[], decision: dec?.shift_data||null };
}

async function saveResponseToBackend(yearMonth, name, response) {
  if (!supabaseClient) return;
  const payload = {
    year_month: yearMonth, name,
    answers: response.answers || {},
    max_per_week: response.maxPerWeek ?? 'none',
    saturday_pref: response.saturdayPref ?? 'none',
    is_beginner: !!response.isBeginner,
    submitted: !!response.submitted,
  };
  if (response.submitted) payload.submitted_at = new Date().toISOString();
  await supabaseClient.from('responses').upsert(payload, { onConflict: 'year_month,name' });
}

async function saveConfigToBackend(yearMonth, config) {
  if (!supabaseClient) return;
  await supabaseClient.from('month_config').upsert({
    year_month: yearMonth,
    total_people: config.totalPeople,
    study_days: config.studyDays,
    extra_holidays: config.extraHolidays,
    removed_holidays: config.removedHolidays,
  }, { onConflict: 'year_month' });
}

async function syncNamesToBackend(localNames) {
  if (!supabaseClient) return;
  const { data: dbRows } = await supabaseClient.from('names').select('name');
  const dbNames = (dbRows || []).map(r => r.name);
  const toAdd = localNames.filter(n => !dbNames.includes(n));
  const toRemove = dbNames.filter(n => !localNames.includes(n));
  if (toAdd.length) {
    await supabaseClient.from('names').upsert(toAdd.map(name => ({ name })), { onConflict: 'name' });
  }
  if (toRemove.length) {
    await supabaseClient.from('names').delete().in('name', toRemove);
  }
}

// 全員回答済みになった時に: 確定シフトをSupabaseに保存 → BotにLINE投稿を依頼
// 修正版 (誰かが回答を修正→再送信) では、シフト内容が変わった場合のみ posted_at を
// リセットして再投稿させる。結果が同じなら再投稿しない (LINEスパム防止)。
async function saveDecisionAndAutoPost(yearMonth, decided) {
  if (!supabaseClient) return;
  const newShiftData = decided.assignments || {};
  const newShiftCount = decided.shiftCount || {};

  const { data: existing } = await supabaseClient.from('decisions')
    .select('shift_data, posted_at').eq('year_month', yearMonth).maybeSingle();

  const shiftChanged = !existing
    || JSON.stringify(existing.shift_data || {}) !== JSON.stringify(newShiftData);

  // シフトが変わっていなくて既に投稿済みなら、何もしない
  if (!shiftChanged && existing && existing.posted_at) {
    console.log('shift unchanged, skip auto-post');
    return;
  }

  const payload = {
    year_month: yearMonth,
    shift_data: newShiftData,
    shift_count: newShiftCount,
  };
  // シフト内容が変わった場合のみ posted_at をリセットして再投稿対象に
  if (shiftChanged) payload.posted_at = null;

  const { error } = await supabaseClient.from('decisions').upsert(payload, { onConflict: 'year_month' });
  if (error) { console.error('decisions upsert error:', error); return; }

  try {
    const resp = await fetch(`${BOT_URL}/api/auto-post-decision`, { method: 'POST' });
    const data = await resp.json().catch(() => ({}));
    console.log('auto-post-decision:', resp.status, data);
  } catch (e) {
    console.error('auto-post-decision call failed:', e);
  }
}

// ============================================================
// シフト決定アルゴリズム
// ============================================================
function decideShifts(year, month, validDates, responses) {
  const assignments = {};
  const shiftCount = {};      // 枠数 (表示用; 1スロット=1)
  const dayCount = {};        // 出勤日数 (公平性判定用; 1日=1)
  const amCount = {};         // 午前に入った回数 (公平性2用)
  const weekDayCount = {};    // 週ごとの出勤日数 (maxPerWeek 用)
  const daysAssigned = {};    // { name: Set<'YYYY-MM-DD'> }
  const names = Object.keys(responses);
  const beginnerNames = names.filter(n => responses[n].isBeginner);
  const regularNames = names.filter(n => !responses[n].isBeginner);
  names.forEach(n => {
    shiftCount[n] = 0;
    dayCount[n] = 0;
    amCount[n] = 0;
    weekDayCount[n] = {};
    daysAssigned[n] = new Set();
  });

  const monthStart = new Date(year, month - 1, 1);
  const getWeekNum = (date) => Math.floor((date - monthStart) / (7 * 86400000));

  const canAssign = (name, date) => {
    const r = responses[name];
    if (!r) return false;
    if (r.maxPerWeek !== null && r.maxPerWeek !== undefined && r.maxPerWeek !== 'none') {
      const wk = getWeekNum(date);
      const ds = fmtDate(date.getFullYear(), date.getMonth()+1, date.getDate());
      // 既にその日に入っていれば追加してもカウントは増えない
      if (!daysAssigned[name].has(ds)) {
        if ((weekDayCount[name][wk] || 0) >= Number(r.maxPerWeek)) return false;
      }
    }
    return true;
  };

  const record = (name, date, slot) => {
    const ds = fmtDate(date.getFullYear(), date.getMonth()+1, date.getDate());
    const key = `${ds}_${slot}`;
    if (!assignments[key]) assignments[key] = [];
    assignments[key].push(name);
    shiftCount[name]++;
    if (slot === 'am') amCount[name]++;
    if (!daysAssigned[name].has(ds)) {
      daysAssigned[name].add(ds);
      dayCount[name]++;
      const wk = getWeekNum(date);
      weekDayCount[name][wk] = (weekDayCount[name][wk] || 0) + 1;
    }
  };

  const isAvailableAt = (n, ds, slot) => {
    const m = responses[n].answers[`${ds}_${slot}`];
    return m === 'circle' || m === 'triangle';
  };

  // ============ 平日アルゴリズム (既存ロジック踏襲、公平性は dayCount) ============
  // 初心者は通常選出からは除外 (後で追加で入れる)
  const eligiblesWeekday = (date, slot, mark, exclude) => {
    const ds = fmtDate(date.getFullYear(), date.getMonth()+1, date.getDate());
    const key = `${ds}_${slot}`;
    return regularNames
      .filter(n => !exclude.includes(n))
      .filter(n => responses[n].answers[key] === mark)
      .filter(n => canAssign(n, date));
  };
  const sortByLoadAndRandom = (arr) => arr.sort((a,b) => {
    const d = dayCount[a] - dayCount[b];
    return d !== 0 ? d : Math.random() - 0.5;
  });
  const pickWeekday = (date, slot, capacity, exclude) => {
    let circles = eligiblesWeekday(date, slot, 'circle', exclude);
    sortByLoadAndRandom(circles);
    let selected = circles.slice(0, capacity);
    if (selected.length < capacity) {
      const triangles = eligiblesWeekday(date, slot, 'triangle', [...exclude, ...selected]);
      sortByLoadAndRandom(triangles);
      selected = selected.concat(triangles.slice(0, capacity - selected.length));
    }
    return selected;
  };

  // ============ 土曜アルゴリズム (刷新) ============
  // 4種の組合せ: am-only / am+noon / noon+pm / pm-only
  // 枠: am=1, noon=2, pm=2
  // 優先順位: 人数最大化 > ○優先 > 公平性 > アンケート > ランダム
  const solveSaturday = (date) => {
    const ds = fmtDate(date.getFullYear(), date.getMonth()+1, date.getDate());
    // 各人の出勤可能スロット (初心者は通常選出から除外)
    const elig = {};
    for (const n of regularNames) {
      if (!canAssign(n, date)) { elig[n] = null; continue; }
      const amM = responses[n].answers[`${ds}_am`];
      const noonM = responses[n].answers[`${ds}_noon`];
      const pmM = responses[n].answers[`${ds}_pm`];
      const amOk = amM === 'circle' || amM === 'triangle';
      const noonOk = noonM === 'circle' || noonM === 'triangle';
      const pmOk = pmM === 'circle' || pmM === 'triangle';
      elig[n] = { amOk, noonOk, pmOk, amM, noonM, pmM };
    }
    const amOnlyCands = regularNames.filter(n => elig[n] && elig[n].amOk);
    const amNoonCands = regularNames.filter(n => elig[n] && elig[n].amOk && elig[n].noonOk);
    const noonPmCands = regularNames.filter(n => elig[n] && elig[n].noonOk && elig[n].pmOk);
    const pmOnlyCands = regularNames.filter(n => elig[n] && elig[n].pmOk);

    // (a, b, c, d): am-only, am+noon, noon+pm, pm-only の人数
    // a+b<=1, b+c<=2, c+d<=2
    const patterns = [];
    for (let a = 0; a <= 1; a++) {
      for (let b = 0; b <= 1 - a; b++) {
        for (let c = 0; c <= 2 - b; c++) {
          for (let d = 0; d <= 2 - c; d++) {
            patterns.push({ a, b, c, d, total: a + b + c + d });
          }
        }
      }
    }
    patterns.sort((x, y) => y.total - x.total);

    const pickK = (cands, k, exclude) => {
      const available = cands.filter(c => !exclude.has(c));
      if (k > available.length) return [];
      const results = [];
      const rec = (start, cur) => {
        if (cur.length === k) { results.push([...cur]); return; }
        for (let i = start; i < available.length; i++) {
          cur.push(available[i]);
          rec(i + 1, cur);
          cur.pop();
        }
      };
      rec(0, []);
      return results;
    };

    const scoreAssignment = (pat, asn) => {
      // [-people, -slotTypes, -slots, triangles, daySum, surveyMisses, amSum, random]: 小さいほど良い
      // 順位: 人数最大 → カバー時間帯数最大(満遍なく) → 枠数最大 → ○優先 → 公平性1 → アンケート → 公平性2(午前回数) → ランダム
      let triangles = 0, daySum = 0, surveyMisses = 0, amSum = 0;
      const addPerson = (n, slotsOfPerson) => {
        for (const s of slotsOfPerson) {
          if (elig[n][s + 'M'] === 'triangle') triangles++;
          if (s === 'am') amSum += amCount[n] || 0;
        }
        daySum += dayCount[n] || 0;
        const pref = responses[n].saturdayPref;
        // 希望スロットが組合せに含まれていなければ miss
        if (pref && pref !== 'none' && !slotsOfPerson.includes(pref)) surveyMisses++;
      };
      for (const n of asn.amOnly) addPerson(n, ['am']);
      for (const n of asn.amNoon) addPerson(n, ['am', 'noon']);
      for (const n of asn.noonPm) addPerson(n, ['noon', 'pm']);
      for (const n of asn.pmOnly) addPerson(n, ['pm']);
      const amFilled = (pat.a > 0 || pat.b > 0) ? 1 : 0;
      const noonFilled = (pat.b > 0 || pat.c > 0) ? 1 : 0;
      const pmFilled = (pat.c > 0 || pat.d > 0) ? 1 : 0;
      const slotTypes = amFilled + noonFilled + pmFilled;
      const slots = pat.a + 2 * pat.b + 2 * pat.c + pat.d;
      return [-pat.total, -slotTypes, -slots, triangles, daySum, surveyMisses, amSum, Math.random()];
    };

    const cmpScore = (x, y) => {
      for (let i = 0; i < x.length; i++) {
        if (x[i] !== y[i]) return x[i] - y[i];
      }
      return 0;
    };

    let best = null;
    for (const pat of patterns) {
      if (best && pat.total < best.total) break;  // 人数最大化が最優先 (patterns は total 降順)
      const empty = new Set();
      for (const amOnly of pickK(amOnlyCands, pat.a, empty)) {
        const u1 = new Set(amOnly);
        for (const amNoon of pickK(amNoonCands, pat.b, u1)) {
          const u2 = new Set([...u1, ...amNoon]);
          for (const noonPm of pickK(noonPmCands, pat.c, u2)) {
            const u3 = new Set([...u2, ...noonPm]);
            for (const pmOnly of pickK(pmOnlyCands, pat.d, u3)) {
              const asn = { amOnly, amNoon, noonPm, pmOnly };
              const score = scoreAssignment(pat, asn);
              if (!best || cmpScore(score, best.score) < 0) {
                best = { assignment: asn, total: pat.total, score };
              }
            }
          }
        }
      }
    }

    return best ? best.assignment : { amOnly: [], amNoon: [], noonPm: [], pmOnly: [] };
  };

  // 初心者を1日1人追加 (枠+1の効果)
  // 土曜は 4組合せの中で枠数が多いものを優先
  const addBeginnerForDate = (date) => {
    if (beginnerNames.length === 0) return;
    const ds = fmtDate(date.getFullYear(), date.getMonth()+1, date.getDate());
    const cands = beginnerNames.filter(n => {
      if (!canAssign(n, date)) return false;
      if (date.getDay() === 6) {
        return isAvailableAt(n, ds, 'am') || isAvailableAt(n, ds, 'noon') || isAvailableAt(n, ds, 'pm');
      }
      return isAvailableAt(n, ds, 'pm');
    });
    if (cands.length === 0) return;
    // 公平性: dayCount少順 + ランダム
    cands.sort((a, b) => {
      const d = dayCount[a] - dayCount[b];
      return d !== 0 ? d : Math.random() - 0.5;
    });
    const beg = cands[0];
    if (date.getDay() === 6) {
      const amOk = isAvailableAt(beg, ds, 'am');
      const noonOk = isAvailableAt(beg, ds, 'noon');
      const pmOk = isAvailableAt(beg, ds, 'pm');
      // 4組合せのうち利用可能なものを列挙、枠数が多いものを優先
      const combos = [];
      if (amOk && noonOk) combos.push(['am', 'noon']);
      if (noonOk && pmOk) combos.push(['noon', 'pm']);
      if (amOk) combos.push(['am']);
      if (pmOk) combos.push(['pm']);
      combos.sort((a, b) => b.length - a.length || Math.random() - 0.5);
      combos[0].forEach(s => record(beg, date, s));
    } else {
      record(beg, date, 'pm');
    }
  };

  validDates.forEach(date => {
    if (date.getDay() === 6) {
      const sat = solveSaturday(date);
      sat.amOnly.forEach(n => record(n, date, 'am'));
      sat.amNoon.forEach(n => { record(n, date, 'am'); record(n, date, 'noon'); });
      sat.noonPm.forEach(n => { record(n, date, 'noon'); record(n, date, 'pm'); });
      sat.pmOnly.forEach(n => record(n, date, 'pm'));
    } else {
      // 平日: 午後のみ, 定員2
      const selected = pickWeekday(date, 'pm', 2, []);
      selected.forEach(n => record(n, date, 'pm'));
    }
    // 通常選出の後に初心者を追加
    addBeginnerForDate(date);
  });

  return { assignments, shiftCount };
}

// ============================================================
// メインコンポーネント
// ============================================================
const { year: nextYear, month: nextMonth } = getNextMonth();
const ymKey = `${nextYear}-${pad(nextMonth)}`;

function App() {
  const [page, setPage] = useState(1);

  // グローバル: 名前リスト (月をまたいで保存)
  const [names, setNames] = useState(() => storage.load('shift_names', []));
  const [currentName, setCurrentName] = useState(() => storage.load('shift_current_name', null));

  // 月別設定
  const [config, setConfig] = useState(() => storage.load(`shift_config_${ymKey}`, {
    studyDays: [],
    extraHolidays: [],
    removedHolidays: [],
    totalPeople: 10
  }));

  // 回答 (全員分)
  const [responses, setResponses] = useState(() => storage.load(`shift_responses_${ymKey}`, {}));

  // 確定シフト (page 2 で計算)
  const [decided, setDecided] = useState(null);

  // localStorage 永続化 (オフライン時/Supabase未設定時のフォールバック)
  useEffect(() => { storage.save('shift_names', names); }, [names]);
  useEffect(() => { storage.save('shift_current_name', currentName); }, [currentName]);
  useEffect(() => { storage.save(`shift_config_${ymKey}`, config); }, [config]);
  useEffect(() => { storage.save(`shift_responses_${ymKey}`, responses); }, [responses]);

  // Supabase 連携: マウント時にロード、変更時に保存 (デバイス間共有)
  const loadedRef = useRef(false);

  // 初回ロード: Supabase に何かあればその内容を採用。空なら localStorage の内容を seed
  useEffect(() => {
    if (!supabaseClient) { loadedRef.current = true; return; }
    // クロージャ時点のローカル値を保持 (Supabaseが空だった場合の seed 用)
    const initialNames = names;
    const initialConfig = config;
    const initialResponses = responses;
    (async () => {
      try {
        const state = await loadStateFromBackend(ymKey);
        const hasDbData = state && (
          (state.names && state.names.length) ||
          state.config ||
          (state.responses && state.responses.length)
        );
        if (hasDbData) {
          if (state.names && state.names.length) setNames(state.names);
          if (state.config) {
            setConfig({
              studyDays: state.config.study_days || [],
              extraHolidays: state.config.extra_holidays || [],
              removedHolidays: state.config.removed_holidays || [],
              totalPeople: state.config.total_people || 10,
            });
          }
          if (state.responses && state.responses.length) {
            const map = {};
            state.responses.forEach(r => {
              map[r.name] = {
                answers: r.answers || {},
                maxPerWeek: r.max_per_week || 'none',
                saturdayPref: r.saturday_pref || 'none',
                isBeginner: !!r.is_beginner,
                submitted: !!r.submitted,
              };
            });
            setResponses(map);
          }
        } else {
          // Supabase が空 -> localStorage の内容を seed
          if (initialNames.length) await syncNamesToBackend(initialNames);
          await saveConfigToBackend(ymKey, initialConfig);
          for (const [name, response] of Object.entries(initialResponses)) {
            await saveResponseToBackend(ymKey, name, response);
          }
        }
      } catch (e) { console.error('loadStateFromBackend failed:', e); }
      loadedRef.current = true;
    })();
  }, []);

  // names 同期 (初回ロード後のみ)
  useEffect(() => {
    if (!loadedRef.current) return;
    syncNamesToBackend(names).catch(e => console.error('syncNamesToBackend:', e));
  }, [names]);

  // config 同期
  useEffect(() => {
    if (!loadedRef.current) return;
    saveConfigToBackend(ymKey, config).catch(e => console.error('saveConfigToBackend:', e));
  }, [config]);

  // 現在ユーザの回答を debounce 保存 (○△✕の選択など)
  useEffect(() => {
    if (!loadedRef.current || !currentName) return;
    const me = responses[currentName];
    if (!me) return;
    const timer = setTimeout(() => {
      saveResponseToBackend(ymKey, currentName, me).catch(e => console.error('saveResponseToBackend:', e));
    }, 600);
    return () => clearTimeout(timer);
  }, [responses, currentName]);

  // 有効な日付の計算 (日曜・祝日・勉強会日を除外)
  const validDates = useMemo(() => {
    const result = [];
    const dim = daysInMonth(nextYear, nextMonth);
    for (let d = 1; d <= dim; d++) {
      const ds = fmtDate(nextYear, nextMonth, d);
      const date = new Date(nextYear, nextMonth - 1, d);
      if (date.getDay() === 0) continue;
      const isBuiltinHoliday = HOLIDAYS[ds] && !config.removedHolidays.includes(ds);
      const isExtraHoliday = config.extraHolidays.includes(ds);
      if (isBuiltinHoliday || isExtraHoliday) continue;
      if (config.studyDays.includes(ds)) continue;
      result.push(date);
    }
    return result;
  }, [config]);

  // 現在ユーザの回答を取得 / 初期化
  const myResponse = currentName ? responses[currentName] || null : null;
  const ensureMyResponse = useCallback(() => {
    if (!currentName) return null;
    if (responses[currentName]) return responses[currentName];
    const init = { answers: {}, maxPerWeek: 'none', saturdayPref: 'none', isBeginner: false, submitted: false };
    setResponses(prev => ({ ...prev, [currentName]: init }));
    return init;
  }, [currentName, responses]);

  // 自分の枠を選択
  const setMark = (dateKey, slot, mark) => {
    if (!currentName) return;
    const key = `${dateKey}_${slot}`;
    setResponses(prev => {
      const me = prev[currentName] || { answers: {}, maxPerWeek: 'none', saturdayPref: 'none', isBeginner: false };
      return { ...prev, [currentName]: { ...me, answers: { ...me.answers, [key]: mark } } };
    });
  };

  // 名前操作
  const addName = (n) => {
    const trimmed = n.trim();
    if (!trimmed || names.includes(trimmed)) return;
    setNames([...names, trimmed]);
    setCurrentName(trimmed);
  };
  const deleteName = (n) => {
    if (!confirm(`名前 "${n}" を削除しますか? この月の回答も削除されます。`)) return;
    setNames(names.filter(x => x !== n));
    if (currentName === n) setCurrentName(null);
    setResponses(prev => { const c = {...prev}; delete c[n]; return c; });
    if (supabaseClient) {
      supabaseClient.from('responses').delete().eq('year_month', ymKey).eq('name', n)
        .then(({ error }) => { if (error) console.error('delete response:', error); });
    }
  };

  // 設定操作
  const addStudyDay = (d) => { if (d && !config.studyDays.includes(d)) setConfig({...config, studyDays: [...config.studyDays, d].sort()}); };
  const removeStudyDay = (d) => setConfig({...config, studyDays: config.studyDays.filter(x => x !== d)});
  const addExtraHoliday = (d) => { if (d && !config.extraHolidays.includes(d)) setConfig({...config, extraHolidays: [...config.extraHolidays, d].sort()}); };
  const removeExtraHoliday = (d) => setConfig({...config, extraHolidays: config.extraHolidays.filter(x => x !== d)});
  const toggleRemoveHoliday = (d) => {
    if (config.removedHolidays.includes(d)) setConfig({...config, removedHolidays: config.removedHolidays.filter(x=>x!==d)});
    else setConfig({...config, removedHolidays: [...config.removedHolidays, d].sort()});
  };

  const updateMyField = (field, value) => {
    if (!currentName) return;
    setResponses(prev => {
      const me = prev[currentName] || { answers: {}, maxPerWeek: 'none', saturdayPref: 'none', isBeginner: false };
      return { ...prev, [currentName]: { ...me, [field]: value } };
    });
  };

  // 送信ボタン: page 2 へ
  const onSubmit = () => {
    if (!currentName) { alert('まず名前を選択してください'); return; }
    setResponses(prev => ({...prev, [currentName]: {...(prev[currentName]||{}), submitted: true}}));
    computeAndShow();
  };
  const computeAndShow = () => {
    const submittedResponses = {};
    Object.entries(responses).forEach(([n, r]) => {
      if (r.submitted || n === currentName) submittedResponses[n] = r;
    });
    const result = decideShifts(nextYear, nextMonth, validDates, submittedResponses);
    setDecided(result);
    setPage(2);
    // 全員回答済みになったタイミングで、確定シフトを保存しLINEへ自動投稿
    if (Object.keys(submittedResponses).length >= config.totalPeople) {
      saveDecisionAndAutoPost(ymKey, result);
    }
  };

  const responseCount = Object.values(responses).filter(r => r.submitted).length;
  const allSubmitted = responseCount >= config.totalPeople;

  if (page === 2) {
    return <ResultPage
      year={nextYear} month={nextMonth}
      validDates={validDates}
      config={config}
      responses={responses}
      decided={decided}
      allSubmitted={allSubmitted}
      responseCount={responseCount}
      onBack={() => setPage(1)}
    />;
  }

  return (
    <div className="container">
      <header>
        <div className="topbar">
          <div>
            <h1>シフト調整 {nextMonth}月分</h1>
          </div>
          <div className="progress">{responseCount} / {config.totalPeople} 名 回答済</div>
        </div>
      </header>

      {/* 名前選択 */}
      <section className="card">
        <h2>名前を選択</h2>
        <NameSection names={names} currentName={currentName} onSelect={setCurrentName} onAdd={addName} onDelete={deleteName} />
      </section>

      {/* 設定 */}
      <section className="card">
        <h2>{nextMonth}月の設定</h2>
        <div className="row" style={{alignItems: 'center', gap: 10, marginBottom: 16}}>
          <label style={{fontSize: 'clamp(12px, 1.3vw, 14px)'}}>回答必要人数</label>
          <div style={{display: 'inline-flex', alignItems: 'baseline', gap: 4, whiteSpace: 'nowrap'}}>
            <input type="number" min="1" value={config.totalPeople}
              onChange={e => setConfig({...config, totalPeople: Math.max(1, parseInt(e.target.value)||1)})}
              style={{width: 56, minWidth: 0, fontSize: 18, fontFamily: 'Shippori Mincho, serif', padding: '4px 6px', textAlign: 'center'}} />
            <span style={{fontFamily: 'Shippori Mincho, serif', fontSize: 18}}>名</span>
          </div>
        </div>

        <details>
          <summary>勉強会の日 (デフォルト: 第3木曜日)</summary>
          <DateListEditor dates={config.studyDays} onAdd={addStudyDay} onRemove={removeStudyDay}
            year={nextYear} month={nextMonth} defaultDate={getThirdThursday(nextYear, nextMonth)} />
        </details>

        <details>
          <summary>祝日の設定</summary>
          <div style={{marginBottom: 12, fontSize: 13, color: 'var(--ink-soft)'}}>追加の祝日</div>
          <DateListEditor dates={config.extraHolidays} onAdd={addExtraHoliday} onRemove={removeExtraHoliday}
            year={nextYear} month={nextMonth} />
          <hr/>
          <div style={{marginBottom: 12, fontSize: 13, color: 'var(--ink-soft)'}}>デフォルト祝日 (クリックで除外/復帰)</div>
          <div className="row">
            {Object.entries(HOLIDAYS)
              .filter(([d]) => d.startsWith(ymKey))
              .map(([d, name]) => (
                <button key={d} className={config.removedHolidays.includes(d) ? 'ghost small' : 'small'}
                  onClick={() => toggleRemoveHoliday(d)} title={config.removedHolidays.includes(d) ? "クリックで復帰" : "クリックで除外"}>
                  {d.split('-')[2]}日 {name} {config.removedHolidays.includes(d) ? '(除外中)' : ''}
                </button>
              ))}
            {Object.keys(HOLIDAYS).filter(d => d.startsWith(ymKey)).length === 0 && (
              <span className="empty-state">該当月に祝日なし</span>
            )}
          </div>
        </details>
      </section>

      {/* オプション */}
      {currentName && (
      <section className="card">
        <h2>個人オプション</h2>
        <div className="row" style={{gap: 24}}>
          <div className="col">
            <label>週あたり最大シフト数</label>
            <select value={myResponse?.maxPerWeek ?? 'none'} onChange={e => updateMyField('maxPerWeek', e.target.value)}>
              <option value="none">特になし</option>
              {[0,1,2,3,4,5,6,7].map(n => <option key={n} value={n}>週{n}日まで</option>)}
            </select>
          </div>
          <div className="col">
            <label>土曜のシフト希望</label>
            <select value={myResponse?.saturdayPref ?? 'none'} onChange={e => updateMyField('saturdayPref', e.target.value)}>
              <option value="none">特になし</option>
              <option value="am">午前を希望</option>
              <option value="noon">正午を希望</option>
              <option value="pm">午後を希望</option>
            </select>
          </div>
          <div className="col">
            <label>初心者 (土曜午前は不可・入った枠は定員+1)</label>
            <label style={{display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer'}}>
              <input type="checkbox" checked={!!myResponse?.isBeginner}
                onChange={e => updateMyField('isBeginner', e.target.checked)} />
              <span>初心者として登録する</span>
            </label>
          </div>
        </div>
      </section>
      )}

      {/* 自分のカレンダー */}
      <section className="card">
        <h2>あなたの参加可能日</h2>
        <Legend />
        {!currentName && <div className="warning">名前を選択すると入力できます</div>}
        <div className="month-header">{nextYear}年 {nextMonth}月</div>
        <Calendar
          year={nextYear} month={nextMonth} config={config}
          responses={currentName ? { [currentName]: responses[currentName] || { answers: {} } } : {}}
          mode="select" currentName={currentName} onMark={setMark}
        />
        {/* 送信ボタン (参加可能日の直下) */}
        <div className="submit-bar">
          <button onClick={onSubmit} disabled={!currentName}>回答を送信 →</button>
        </div>
      </section>

      {/* 全員の回答カレンダー */}
      <section className="card">
        <h2>全員の回答状況</h2>
        <div className="legend" style={{flexDirection: 'column', alignItems: 'flex-start', gap: 8}}>
          <div className="legend-item"><span className="name-tag circle" style={{margin: 0, minWidth: 32}}>&nbsp;</span> ：○ (参加可能)</div>
          <div className="legend-item"><span className="name-tag triangle" style={{margin: 0, minWidth: 32}}>&nbsp;</span> ：△ (他に2人いなければ参加)</div>
        </div>
        <div className="month-header">{nextYear}年 {nextMonth}月</div>
        <Calendar
          year={nextYear} month={nextMonth} config={config}
          responses={responses} mode="combined"
        />
      </section>
    </div>
  );
}

function NameSection({ names, currentName, onSelect, onAdd, onDelete }) {
  const [input, setInput] = useState('');
  return (
    <>
      <div className="row" style={{marginBottom: 16}}>
        <input type="text" placeholder="新しい名前を追加" value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') { onAdd(input); setInput(''); } }} />
        <button onClick={() => { onAdd(input); setInput(''); }}>+ 追加</button>
      </div>
      <div className="row">
        {names.length === 0 && <div className="empty-state">名前を追加してください</div>}
        {names.map(n => (
          <div key={n} className={`name-pill ${currentName === n ? 'active' : ''}`} onClick={() => onSelect(n)}>
            <span>{n}</span>
            <span className="del" onClick={e => { e.stopPropagation(); onDelete(n); }}>×</span>
          </div>
        ))}
      </div>
    </>
  );
}

function DateListEditor({ dates, onAdd, onRemove, year, month, defaultDate }) {
  const [input, setInput] = useState(defaultDate || fmtDate(year, month, 1));
  return (
    <>
      <div className="row" style={{marginBottom: 12}}>
        <input type="date" value={input} onChange={e => setInput(e.target.value)}
          min={fmtDate(year, month, 1)} max={fmtDate(year, month, daysInMonth(year, month))} />
        <button className="small" onClick={() => onAdd(input)}>+ 追加</button>
      </div>
      <div className="row">
        {dates.length === 0 && <span className="empty-state">なし</span>}
        {dates.map(d => (
          <span key={d} className="pill">
            {d}
            <button onClick={() => onRemove(d)}>×</button>
          </span>
        ))}
      </div>
    </>
  );
}

function Legend() {
  return (
    <div className="legend">
      <div className="legend-item"><span className="legend-mark" style={{color:'var(--ok)'}}>○</span> 参加可能</div>
      <div className="legend-item"><span className="legend-mark" style={{color:'var(--warn)'}}>△</span> 他に2人いなければ参加</div>
      <div className="legend-item"><span className="legend-mark" style={{color:'var(--accent)', opacity:0.5}}>✕</span> 参加不可 (デフォルト)</div>
      <div className="legend-item" style={{color:'var(--ink-muted)'}}>クリックで切り替え</div>
    </div>
  );
}

function Calendar({ year, month, config, responses, mode, currentName, onMark, decided }) {
  const dim = daysInMonth(year, month);
  // 6列グリッド (月-土)。日曜は完全に除外。
  const firstDow = new Date(year, month - 1, 1).getDay();
  let dStart, firstCol;
  if (firstDow === 0) { dStart = 2; firstCol = 0; }
  else { dStart = 1; firstCol = firstDow - 1; }
  const cells = [];
  for (let i = 0; i < firstCol; i++) cells.push(null);
  for (let d = dStart; d <= dim; d++) {
    if (new Date(year, month - 1, d).getDay() === 0) continue;
    cells.push(d);
  }
  while (cells.length % 6 !== 0) cells.push(null);

  const isExcluded = (d) => {
    const ds = fmtDate(year, month, d);
    if (HOLIDAYS[ds] && !config.removedHolidays.includes(ds)) return HOLIDAYS[ds];
    if (config.extraHolidays.includes(ds)) return '祝日';
    if (config.studyDays.includes(ds)) return '勉強会';
    return null;
  };

  return (
    <table className={`calendar ${mode === 'combined' || mode === 'decided' ? 'read-only' : ''}`}>
      <thead>
        <tr>
          <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th className="sat">土</th>
        </tr>
      </thead>
      <tbody>
        {Array.from({ length: cells.length / 6 }).map((_, weekIdx) => (
          <tr key={weekIdx}>
            {cells.slice(weekIdx * 6, weekIdx * 6 + 6).map((d, i) => {
              if (d === null) return <td key={i} className="empty"></td>;
              const ds = fmtDate(year, month, d);
              const date = new Date(year, month - 1, d);
              const dow = date.getDay();
              const excluded = isExcluded(d);
              const dateClass = dow === 6 ? 'sat' : '';
              if (excluded) {
                return <td key={i} className="excluded">
                  <div className={`date-num ${dateClass}`}>{d}</div>
                  <div className="cell-inner">
                    <div className="excluded-label">{excluded}</div>
                  </div>
                </td>;
              }
              const slots = dow === 6 ? SLOTS_SATURDAY : SLOTS_WEEKDAY;
              const isSolo = slots.length === 1;
              return (
                <td key={i}>
                  <div className={`date-num ${dateClass}`}>{d}</div>
                  <div className="cell-inner">
                  {mode === 'select' && (isSolo ? (
                    slots.map(slot => {
                      const key = `${ds}_${slot}`;
                      const mark = currentName && responses[currentName]?.answers[key] || 'cross';
                      return (
                        <div key={slot} className="slot solo" onClick={() => currentName && onMark(ds, slot, cycleMark(mark))}>
                          <span className={`slot-mark ${mark}`}>{markChar(mark)}</span>
                        </div>
                      );
                    })
                  ) : (
                    // 土曜: ラベル左、選択枠は右の余白の中央。3行をグループでまとめてセル中央へ
                    <div className="slot-rows-group">
                      {slots.map(slot => {
                        const key = `${ds}_${slot}`;
                        const mark = currentName && responses[currentName]?.answers[key] || 'cross';
                        const isBeginner = !!(currentName && responses[currentName]?.isBeginner);
                        const skipCircle = isBeginner && slot === 'am';
                        return (
                          <div key={slot} className="slot-row">
                            <span className="slot-row-label">{SLOT_LABEL[slot]}:</span>
                            <div className="slot in-row" onClick={() => currentName && onMark(ds, slot, cycleMark(mark, skipCircle))}>
                              <span className={`slot-mark ${mark}`}>{markChar(mark)}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                  {mode === 'combined' && (
                    <div className="combined-cell">
                      {slots.map(slot => {
                        const key = `${ds}_${slot}`;
                        const respList = Object.entries(responses)
                          .map(([n, r]) => [n, r.answers?.[key] || 'cross'])
                          .filter(([, m]) => m !== 'cross');
                        const circles = respList.filter(([, m]) => m === 'circle');
                        const triangles = respList.filter(([, m]) => m === 'triangle');
                        if (dow === 6) {
                          // 土曜: 「午前: [田中] [鈴木]」(ラベル左、名前は右枠内の中央配置、緑→オレンジ縦並び)
                          return (
                            <div key={slot} className="sat-line">
                              <span className="sat-label">{SLOT_LABEL[slot]}:</span>
                              <span className="sat-names-wrap">
                                {circles.length > 0 && (
                                  <div className="sat-names-row">
                                    {circles.map(([n, m]) => (
                                      <span key={n} className={`sat-name ${m}`} style={nameFontStyle(n)}>{n}</span>
                                    ))}
                                  </div>
                                )}
                                {triangles.length > 0 && (
                                  <div className="sat-names-row">
                                    {triangles.map(([n, m]) => (
                                      <span key={n} className={`sat-name ${m}`} style={nameFontStyle(n)}>{n}</span>
                                    ))}
                                  </div>
                                )}
                              </span>
                            </div>
                          );
                        }
                        return (
                          <div key={slot} className={`slot-line ${isSolo ? 'solo' : ''}`}>
                            {!isSolo && <span className="slot-line-label">{SLOT_LABEL[slot]}</span>}
                            <span>
                              {circles.length > 0 && (
                                <div className="name-row">
                                  {circles.map(([n, m]) => (
                                    <span key={n} className={`name-tag ${m}`} style={nameFontStyle(n)}>{n}</span>
                                  ))}
                                </div>
                              )}
                              {triangles.length > 0 && (
                                <div className="name-row">
                                  {triangles.map(([n, m]) => (
                                    <span key={n} className={`name-tag ${m}`} style={nameFontStyle(n)}>{n}</span>
                                  ))}
                                </div>
                              )}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {mode === 'decided' && (
                    <div className="decided-cell">
                      {slots.map(slot => {
                        const key = `${ds}_${slot}`;
                        const people = decided?.[key] || [];
                        if (dow === 6) {
                          return (
                            <div key={slot} className="sat-line">
                              <span className="sat-label">{SLOT_LABEL[slot]}:</span>
                              <span className="sat-names-wrap">
                                {people.map(n => (
                                  <span key={n} className="sat-name sat-name-decided" style={nameFontStyle(n)}>{n}</span>
                                ))}
                              </span>
                            </div>
                          );
                        }
                        return (
                          <div key={slot} className={`slot-line ${isSolo ? 'solo' : ''}`}>
                            {!isSolo && <span className="slot-line-label">{SLOT_LABEL[slot]}</span>}
                            <span>{people.map(n => <span key={n} className="assigned-name" style={nameFontStyle(n)}>{n}</span>)}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  </div>
                </td>
              );
            })}
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function ResultPage({ year, month, validDates, config, responses, decided, allSubmitted, responseCount, onBack }) {
  const assignments = decided?.assignments || {};
  const shiftCount = decided?.shiftCount || {};
  const perPerson = {};  // name -> { ds: [slot...] }
  Object.entries(assignments).forEach(([key, people]) => {
    const [ds, slot] = key.split('_');
    people.forEach(n => {
      if (!perPerson[n]) perPerson[n] = {};
      if (!perPerson[n][ds]) perPerson[n][ds] = [];
      perPerson[n][ds].push(slot);
    });
  });

  return (
    <div className="container">
      <header>
        <div className="topbar">
          <div>
            <h1>シフト表（暫定）</h1>
          </div>
          <div className="progress">{responseCount} 名分の回答に基づく</div>
        </div>
      </header>

      {!allSubmitted && (
        <div className="warning">
          まだ全員 ({responseCount}/{config.totalPeople}) が回答していません。これは現時点の暫定シフトです。
        </div>
      )}
      {allSubmitted && (
        <div className="info">全員の回答が揃いました。LINE Botから配信できます。</div>
      )}

      <section className="card">
        <h2>シフト表</h2>
        <div className="month-header">{year}年 {month}月</div>
        <Calendar year={year} month={month} config={config} responses={responses} mode="decided" decided={assignments} />
      </section>

      <section className="card">
        <h2>個人別の出勤日</h2>
        {Object.keys(perPerson).length === 0 && <div className="empty-state">割り当てなし</div>}
        {Object.entries(perPerson).sort().map(([n, dateMap]) => {
          const sortedDates = Object.keys(dateMap).sort();
          return (
            <div key={n} className="summary-box">
              <div className="summary-name">{n}<span className="summary-count">{shiftCount[n] || 0} 枠</span></div>
              <div className="summary-dates">
                {sortedDates.map((d, i, arr) => {
                  const day = parseInt(d.split('-')[2]);
                  const [yy, mm, dd] = d.split('-').map(Number);
                  const isSat = new Date(yy, mm - 1, dd).getDay() === 6;
                  let label = `${day}`;
                  if (isSat) {
                    const slots = dateMap[d];
                    const earliest = ['am', 'noon', 'pm'].find(s => slots.includes(s));
                    if (earliest) label += ` ${SLOT_LABEL[earliest]}`;
                  }
                  return <span key={d} className="date-chip">{label}{i < arr.length - 1 ? '、' : ''}</span>;
                })}
              </div>
            </div>
          );
        })}
      </section>

      <div className="submit-bar">
        <button className="ghost" onClick={onBack}>← 回答を修正する</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
