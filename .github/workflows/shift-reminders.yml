name: shift-reminders

# 全て JST 9:00 にトリガー (GitHub Actions は UTC なので 00:00 UTC = 09:00 JST)
on:
  schedule:
    # 15日: 月初の呼びかけ (URL + 締切22日)
    - cron: '0 0 15 * *'
    # 21日: 通常リマインド
    - cron: '0 0 21 * *'
    # 22〜30日 毎日: 未回答者がいれば「シフトを提出できません」(24日以降は激つよモード)
    - cron: '0 0 22-30 * *'
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'どのエンドポイントを叩くか'
        required: true
        type: choice
        options:
          - notify-new-month
          - send-reminder
          - send-final-reminder

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: 実行するエンドポイントを決定
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "endpoint=${{ inputs.endpoint }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          day=$(date -u +%d)
          case "$day" in
            15) echo "endpoint=notify-new-month"   >> "$GITHUB_OUTPUT" ;;
            21) echo "endpoint=send-reminder"     >> "$GITHUB_OUTPUT" ;;
            22|23|24|25|26|27|28|29|30) echo "endpoint=send-final-reminder" >> "$GITHUB_OUTPUT" ;;
            *)  echo "endpoint=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: API を呼び出し
        if: steps.pick.outputs.endpoint != ''
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ENDPOINT: ${{ steps.pick.outputs.endpoint }}
        run: |
          curl -fsS -X POST "$BOT_URL/api/$ENDPOINT" \
            -H "x-admin-token: $ADMIN_TOKEN"
